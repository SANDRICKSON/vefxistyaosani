{% extends "base.html" %}

{% block content %}
    
    <div class="container border rounded h-74 mb-2 p-4">
      <form method="post">
        {{ form.hidden_tag() }}
        
        <div class="row mb-3">
            <label for="{{ form.username.id }}" class="col-sm-2 col-form-label">{{ form.username.label }}</label>
            <div class="col-sm-10">
                {{ form.username(class="form-control", placeholder="შეიყვანეთ სახელი") }}
            </div>
        </div>
        <div class="row mb-3">
            <label for="{{ form.password.id }}" class="col-sm-2 col-form-label">{{ form.password.label }}</label>
            <div class="col-sm-10">
                {{ form.password(class="form-control", placeholder="შეიყვანეთ პაროლი") }}
            </div>
        </div>

       
        <div class="row mb-3">
            <div class="col-sm-10 offset-sm-2">
                {{ form.submit(class="btn btn-primary") }}
            </div>
        </div>
        
      </form>
    </div>
{% endblock %}
