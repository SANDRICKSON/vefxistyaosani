{% extends "base.html" %}

{% block content %}
    <div class="container mt-4">
        <form method="post">
            {{ form.hidden_tag() }}
            <div class="row mb-3">
                <div class="col-md-8">
                    {{ form.message(class="form-control", placeholder=form.message.label.text) }}
                </div>
            </div>

            <div class="row">
                <div class="col-md-8">
                    {{ form.submit(class="btn btn-primary btn-lg w-100") }}
                </div>
            </div>
        </form>
    </div>
{% endblock %}
